<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>T1 Seoul Trip Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', -apple-system, sans-serif; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSy" + "Rei_T1_Final_Fixed",
            authDomain: "gemini-app-storage.firebaseapp.com",
            projectId: "gemini-app-storage",
            storageBucket: "gemini-app-storage.appspot.com",
            messagingSenderId: "123456789",
            appId: "t1-trip-app-rei"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const CATEGORIES = [
            { id: 'food', label: '🍴 食嘢', color: 'bg-orange-100 text-orange-600' },
            { id: 'merch', label: '🛍️ 週邊', color: 'bg-red-100 text-red-600' },
            { id: 'trans', label: '🚇 交通', color: 'bg-blue-100 text-blue-600' },
            { id: 'other', label: '✨ 其他', color: 'bg-slate-100 text-slate-600' }
        ];

        const METHODS = [
            { id: 'card', label: '💳 碌卡' },
            { id: 'cash', label: '💵 現金' },
            { id: 'pay', label: '📱 PayPay/交通卡' },
            { id: 'misc', label: '🔄 其他' }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('finance');
            const [user, setUser] = useState(null);
            const [syncStatus, setSyncStatus] = useState('連線中...');
            const [rate, setRate] = useState(0.11);
            const [calcKRW, setCalcKRW] = useState('');
            const [expenses, setExpenses] = useState([]);
            const [expenseDate, setExpenseDate] = useState(new Date().toISOString().split('T')[0]);
            const [expenseName, setExpenseName] = useState('');
            const [expenseKRW, setExpenseKRW] = useState('');
            const [expenseCat, setExpenseCat] = useState('other');
            const [paymentMethod, setPaymentMethod] = useState('card');
            const [editingId, setEditingId] = useState(null);
            const [packingList, setPackingList] = useState([]);
            const [newPackingItem, setNewPackingItem] = useState('');
            const [journalText, setJournalText] = useState('');

            useEffect(() => {
                auth.signInAnonymously().then(cred => setUser(cred.user));
                fetch('https://open.er-api.com/v6/latest/KRW')
                    .then(res => res.json())
                    .then(data => setRate(data.rates.JPY))
                    .catch(() => console.log("Rate fetch failed"));
            }, []);

            useEffect(() => {
                if (!user) return;
                // 固定使用同一個 Collection 名稱確保資料不消失
                const docRef = db.collection('rei_t1_trip_final').doc(user.uid);
                const unsubscribe = docRef.onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.expenses) setExpenses(data.expenses);
                        if (data.packingList) setPackingList(data.packingList);
                        if (data.journalText !== undefined) setJournalText(data.journalText);
                        setSyncStatus('已同步');
                    }
                });
                return () => unsubscribe();
            }, [user]);

            const updateCloud = async (updates) => {
                if (!user) return;
                setSyncStatus('儲存中...');
                await db.collection('rei_t1_trip_final').doc(user.uid).set(updates, { merge: true });
                setSyncStatus('已同步');
            };

            const saveExpense = (e) => {
                e.preventDefault();
                if (!expenseName || !expenseKRW) return;
                const krw = parseFloat(expenseKRW);
                const jpy = krw * rate;
                let newExp;
                if (editingId) {
                    newExp = expenses.map(ex => ex.id === editingId ? { ...ex, date: expenseDate, name: expenseName, krw, jpy, method: paymentMethod, category: expenseCat } : ex);
                    setEditingId(null);
                } else {
                    newExp = [...expenses, { id: Date.now(), date: expenseDate, name: expenseName, krw, jpy, method: paymentMethod, category: expenseCat }];
                }
                setExpenses(newExp);
                updateCloud({ expenses: newExp });
                setExpenseName(''); setExpenseKRW('');
            };

            const startEdit = (e) => {
                setEditingId(e.id);
                setExpenseDate(e.date);
                setExpenseName(e.name);
                setExpenseKRW(e.krw);
                setPaymentMethod(e.method);
                setExpenseCat(e.category || 'other');
            };

            // 分組邏輯
            const groupedExpenses = expenses.reduce((acc, ex) => {
                if (!acc[ex.date]) acc[ex.date] = [];
                acc[ex.date].push(ex);
                return acc;
            }, {});
            const sortedDates = Object.keys(groupedExpenses).sort((a, b) => b.localeCompare(a));

            const totalKRW = expenses.reduce((s, e) => s + e.krw, 0);

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col pb-24">
                    <header className="bg-white p-4 border-b-4 border-red-600 sticky top-0 z-30 shadow-md">
                        <div className="flex justify-between items-center mb-2">
                            <h1 className="text-xl font-black italic tracking-tighter">T1 <span className="text-red-600">FINAL</span></h1>
                            <span className="text-[10px] font-bold bg-emerald-100 text-emerald-600 px-2 py-1 rounded-full">{syncStatus}</span>
                        </div>
                        <div className="bg-slate-100 p-2 rounded-lg flex items-center gap-2">
                            <span className="text-xs font-bold text-slate-500">₩</span>
                            <input type="number" placeholder="換算日元..." className="bg-transparent flex-1 text-sm outline-none font-mono" 
                                value={calcKRW} onChange={e => setCalcKRW(e.target.value)} />
                            <span className="text-red-600 font-bold text-sm">≈ ¥ {(parseFloat(calcKRW||0)*rate).toFixed(0)}</span>
                        </div>
                    </header>

                    <main className="p-4 space-y-4">
                        {activeTab === 'finance' && (
                            <>
                                {/* 總支出大盒 */}
                                <div className="bg-black text-white p-5 rounded-3xl shadow-xl border-b-8 border-red-600">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total Trip Spending</p>
                                    <div className="flex justify-between items-end">
                                        <p className="text-3xl font-black font-mono">₩{totalKRW.toLocaleString()}</p>
                                        <p className="text-lg font-bold text-red-500 font-mono">≈ ¥{(totalKRW * rate).toFixed(0).toLocaleString()}</p>
                                    </div>
                                </div>

                                <form onSubmit={saveExpense} className="bg-white p-4 rounded-2xl border-2 border-slate-200 space-y-3">
                                    <div className="flex gap-2">
                                        <input type="date" value={expenseDate} onChange={e => setExpenseDate(e.target.value)} className="w-1/3 text-xs border rounded p-2" />
                                        <input type="text" placeholder="品項" value={expenseName} onChange={e => setExpenseName(e.target.value)} className="flex-1 text-sm border rounded p-2" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <select value={expenseCat} onChange={e => setExpenseCat(e.target.value)} className="text-xs border rounded p-2 bg-white">
                                            {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
                                        </select>
                                        <select value={paymentMethod} onChange={e => setPaymentMethod(e.target.value)} className="text-xs border rounded p-2 bg-white">
                                            {METHODS.map(m => <option key={m.id} value={m.id}>{m.label}</option>)}
                                        </select>
                                    </div>
                                    <div className="flex gap-2">
                                        <input type="number" placeholder="KRW" value={expenseKRW} onChange={e => setExpenseKRW(e.target.value)} className="flex-1 text-sm border rounded p-2 font-mono" />
                                        <button className="bg-red-600 text-white px-6 rounded font-bold">{editingId ? '更新' : '加入'}</button>
                                    </div>
                                </form>

                                <div className="space-y-6">
                                    {sortedDates.map(date => {
                                        const dayTotal = groupedExpenses[date].reduce((s, e) => s + e.krw, 0);
                                        return (
                                            <div key={date} className="space-y-2">
                                                <div className="flex justify-between items-center px-1 border-b pb-1">
                                                    <span className="text-xs font-black text-slate-500 italic">📅 {date}</span>
                                                    <span className="text-xs font-bold text-red-600">小計: ₩{dayTotal.toLocaleString()}</span>
                                                </div>
                                                {groupedExpenses[date].map(e => {
                                                    const cat = CATEGORIES.find(c => c.id === (e.category || 'other'));
                                                    return (
                                                        <div key={e.id} className="bg-white p-3 rounded-xl border flex justify-between items-center shadow-sm">
                                                            <div className="flex items-center gap-3">
                                                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center text-sm ${cat.color.split(' ')[0]}`}>
                                                                    {cat.label.split(' ')[0]}
                                                                </div>
                                                                <div>
                                                                    <p className="text-xs font-bold">{e.name}</p>
                                                                    <p className="text-[9px] text-slate-400">{METHODS.find(m=>m.id===e.method)?.label}</p>
                                                                </div>
                                                            </div>
                                                            <div className="flex items-center gap-3">
                                                                <div className="text-right">
                                                                    <p className="text-sm font-black font-mono">₩{e.krw.toLocaleString()}</p>
                                                                    <p className="text-[9px] text-red-500 font-bold font-mono">¥{(e.krw * rate).toFixed(0)}</p>
                                                                </div>
                                                                <button onClick={() => startEdit(e)} className="text-blue-400">✎</button>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        );
                                    })}
                                </div>
                            </>
                        )}
                        {/* Packing & Journal 保持不變 */}
                        {activeTab === 'packing' && (
                            <div className="space-y-4">
                                <form onSubmit={(e) => {
                                    e.preventDefault(); if(!newPackingItem) return;
                                    const newList = [...packingList, { id: Date.now(), text: newPackingItem, checked: false }];
                                    setPackingList(newList); updateCloud({ packingList: newList }); setNewPackingItem('');
                                }} className="flex gap-2">
                                    <input type="text" placeholder="仲要帶啲咩？" value={newPackingItem} onChange={e => setNewPackingItem(e.target.value)} className="flex-1 border-2 rounded-xl p-3 text-sm outline-none focus:border-red-600" />
                                    <button className="bg-black text-white px-6 rounded-xl font-bold">＋</button>
                                </form>
                                <div className="bg-white rounded-2xl border-2 border-slate-200 overflow-hidden">
                                    {packingList.map(item => (
                                        <div key={item.id} className="p-4 border-b last:border-0 flex items-center gap-3 active:bg-slate-50" 
                                            onClick={() => {
                                                const newList = packingList.map(i => i.id === item.id ? {...i, checked: !i.checked} : i);
                                                setPackingList(newList); updateCloud({ packingList: newList });
                                            }}>
                                            <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center ${item.checked ? 'bg-red-600 border-red-600 text-white' : 'border-slate-300'}`}>
                                                {item.checked && '✓'}
                                            </div>
                                            <span className={`text-sm ${item.checked ? 'line-through text-slate-300 italic' : 'font-bold text-slate-700'}`}>{item.text}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {activeTab === 'journal' && (
                            <textarea className="w-full h-[60vh] bg-white p-4 rounded-2xl border-2 border-slate-200 outline-none text-sm leading-relaxed" 
                                placeholder="記低賽後心情..." value={journalText} onChange={e => setJournalText(e.target.value)} onBlur={() => updateCloud({ journalText })} />
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t p-2 flex justify-around pb-safe shadow-2xl z-40">
                        <button onClick={()=>setActiveTab('finance')} className={`flex flex-col items-center p-2 rounded-xl w-20 ${activeTab==='finance'?'text-red-600 bg-red-50':'text-slate-400'}`}>
                            <span className="text-xl">💰</span><span className="text-[10px] font-black uppercase">Money</span>
                        </button>
                        <button onClick={()=>setActiveTab('packing')} className={`flex flex-col items-center p-2 rounded-xl w-20 ${activeTab==='packing'?'text-red-600 bg-red-50':'text-slate-400'}`}>
                            <span className="text-xl">🧳</span><span className="text-[10px] font-black uppercase">Pack</span>
                        </button>
                        <button onClick={()=>setActiveTab('journal')} className={`flex flex-col items-center p-2 rounded-xl w-20 ${activeTab==='journal'?'text-red-600 bg-red-50':'text-slate-400'}`}>
                            <span className="text-xl">📝</span><span className="text-[10px] font-black uppercase">Log</span>
                        </button>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
